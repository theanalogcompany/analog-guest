# TAC-297 commitments-due scheduled runner.
#
# The route handler at `app/api/cron/commitments-due/route.ts` is invoked
# hourly to transition open `guest_commitments` rows whose
# `expected_arrival` has elapsed into `pending_ack` (CAS-gated) and fire
# the operator APNs push. Vercel's Hobby tier caps cron granularity at
# daily/weekly; this project stays on Hobby, so we trigger the same
# endpoint from GitHub Actions instead — equivalent functionally, just
# moves the trigger off Vercel's cron surface.
#
# Reliability note (documented in CLAUDE.md): GitHub Actions scheduled
# runs can lag the target minute under platform load; an hourly heads-up
# tolerates ±1h precision, so this is acceptable. Revisit (Vercel Pro
# native cron, or QStash) if drift becomes painful, or when the project
# moves to a commercial plan.

name: cron / commitments-due

on:
  schedule:
    # hourly on the hour, UTC. matches the original vercel.json entry.
    - cron: '0 * * * *'
  # manual trigger for ad-hoc testing — useful when seeding a scheduled
  # commitment with a near-now expected_arrival to verify the path end-to-end.
  workflow_dispatch:

jobs:
  fire:
    runs-on: ubuntu-latest
    # don't run on fork PRs — schedule/dispatch are repo-internal only
    if: github.repository == 'theanalogcompany/analog-guest'
    steps:
      - name: hit /api/cron/commitments-due
        env:
          PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$PROD_BASE_URL" ]; then
            echo "::error::PROD_BASE_URL repo variable is unset"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is unset"
            exit 1
          fi
          curl -fsS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${PROD_BASE_URL}/api/cron/commitments-due"
