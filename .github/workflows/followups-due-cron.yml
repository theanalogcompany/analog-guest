# TAC-123 follow-up engine scheduled runner.
#
# The route handler at `app/api/cron/followups-due/route.ts` is invoked
# hourly to scan every venue and dispatch due engine-initiated
# follow-ups for the venues whose local hour matches their
# `followup_rules.cron_hour_local` (default 10am, per-venue tunable).
# Per-venue local-hour filtering lives in JS inside processDueFollowups
# — the cron itself fires hourly UTC.
#
# Sibling to .github/workflows/commitments-due-cron.yml — same trigger
# pattern, same auth, same repo-vars. Vercel's Hobby tier caps cron
# granularity at daily/weekly, so both engine cadences live here.
#
# Reliability note (documented in CLAUDE.md): GitHub Actions scheduled
# runs can lag the target minute under platform load. The follow-up
# engine's daily dispatch tolerates ±1h precision (it picks ONE morning
# tick per venue regardless of which UTC hour the GH job actually
# fires). Revisit (Vercel Pro native cron, or QStash) if drift becomes
# painful, or when the project moves to a commercial plan.

name: cron / followups-due

on:
  schedule:
    # hourly on the hour, UTC. matches the commitments-due cadence so a
    # single cache of bash plumbing covers both crons.
    - cron: '0 * * * *'
  # manual trigger for ad-hoc testing — useful when seeding a synthetic
  # guest with a near-now last_visit_at to verify the end-to-end path.
  workflow_dispatch:

jobs:
  fire:
    runs-on: ubuntu-latest
    # don't run on fork PRs — schedule/dispatch are repo-internal only
    if: github.repository == 'theanalogcompany/analog-guest'
    steps:
      - name: hit /api/cron/followups-due
        env:
          PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$PROD_BASE_URL" ]; then
            echo "::error::PROD_BASE_URL repo variable is unset"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is unset"
            exit 1
          fi
          curl -fsS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${PROD_BASE_URL}/api/cron/followups-due"
